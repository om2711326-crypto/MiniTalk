<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Talk vA0.2.3.0</title>
    <style>
        :root {
            --bg-color: #b2c7da; --app-bg: #fff; --text-color: #000;
            --header-bg: #423630; --my-bubble: #fee500; --other-bubble: #fff;
            --input-bg: #fff; --notice-bg: rgba(0,0,0,0.6);
            --accent: #fee500;
        }
        [data-theme='dark'] {
            --bg-color: #2f3136; --app-bg: #36393f; --text-color: #ffffff;
            --header-bg: #202225; --my-bubble: #f2d400; --other-bubble: #4f545c;
            --input-bg: #40444b; --notice-bg: rgba(255,255,255,0.1);
        }

        /* 🎬 애니메이션 정의 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes progressLoad {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        body { background: var(--bg-color); font-family: 'Apple SD Gothic Neo', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; transition: 0.3s; }
        
        /* 🚀 로딩 바 스타일 */
        #loading-bar-container { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: transparent; z-index: 100; overflow: hidden; display: none; }
        #loading-bar { height: 100%; background: var(--accent); width: 0; transition: 0.2s; box-shadow: 0 0 10px var(--accent); }

        .app-container { background: var(--app-bg); width: 360px; height: 620px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); overflow: hidden; display: flex; flex-direction: column; position: relative; }
        
        /* 로그인 화면 애니메이션 */
        #login-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 40px; box-sizing: border-box; color: var(--text-color); animation: fadeInUp 0.6s ease; }
        
        .btn-main { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
        .btn-main:active { transform: scale(0.96); }

        #chat-screen { display: none; flex-direction: column; height: 100%; animation: fadeInUp 0.5s ease; }
        
        /* 메시지 애니메이션 적용 */
        .msg-unit { display: flex; flex-direction: column; color: var(--text-color); animation: fadeInUp 0.4s ease forwards; }
        
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: var(--bg-color); scroll-behavior: smooth; }
        .bubble { background: var(--other-bubble); padding: 10px 14px; border-radius: 15px; font-size: 0.9rem; max-width: 75%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-break: break-all; }
        .my-msg .bubble { background: var(--my-bubble); color: #000; }

        /* 기타 스타일 생략(동일) */
        .notice-bar { background: var(--notice-bg); color: #fff; padding: 10px 15px; font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .login-input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; }
        .chat-header { background: var(--header-bg); color: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .input-area { padding: 12px; background: var(--app-bg); display: flex; gap: 8px; border-top: 1px solid #eee; }
        #msg-input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 12px; outline: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="loading-bar-container"><div id="loading-bar"></div></div>

    <div id="login-screen">
        <div style="font-size: 3rem; margin-bottom: 10px;">💬</div>
        <b style="margin-bottom:20px;">Mini Talk vA0.2.3.0</b>
        <input type="text" id="user-id" class="login-input" placeholder="아이디">
        <input type="password" id="user-pw" class="login-input" placeholder="비밀번호">
        <button class="btn-main" onclick="handleAuth()">로그인해서 시작하기</button>
        <button onclick="enterGuestMode()" style="margin-top:15px; background:none; border:none; color:#888; cursor:pointer;">👀 조용히 구경하기</button>
    </div>

    <div id="chat-screen">
        <div class="chat-header">
            <div><b id="my-name-display">사용자</b> <small>(🟢<span id="online-count">0</span>)</small></div>
            <button onclick="logout()" style="background:none; border:none; color:#aaa; cursor:pointer; font-size:0.7rem;">채팅방 나가기</button>
        </div>
        <div class="notice-bar"><span id="notice-text">📢 데이터 로딩 중...</span></div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) send()">
            <button class="btn-main" style="width:auto; padding:10px 20px;" onclick="send()">전송</button>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbw794jTi9gE6_GDA8pxoLcYyM0fjH_WngUA54liRUrvlN0uozqAsa9G1R9rIPcMiArD/exec'; 
    let myID = "", isGuest = false;

    // 🌊 로딩 바 애니메이션 제어
    function startLoading() {
        const container = document.getElementById('loading-bar-container');
        const bar = document.getElementById('loading-bar');
        container.style.display = 'block';
        bar.style.width = '0%';
        setTimeout(() => { bar.style.width = '100%'; }, 50);
        setTimeout(() => { container.style.display = 'none'; }, 1000);
    }

    async function handleAuth() {
        const id = document.getElementById('user-id').value;
        const pw = document.getElementById('user-pw').value;
        if(!id || !pw) return alert("빈칸을 채워주세요! 😊");
        
        startLoading(); // 로딩 시작!

        try {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: 'login', id: id, pw: pw }) });
            const data = await res.json();
            if(data.result === "success") { 
                setTimeout(() => enterChat(id, false), 800); 
            } else {
                alert("정보를 다시 확인해 주세요! 🙏");
            }
        } catch(e) { alert("서버 연결 실패 😟"); }
    }

    function enterChat(id, guestStatus) {
        myID = id; isGuest = guestStatus;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('my-name-display').innerText = id;
        loadMessages();
        setInterval(loadMessages, 4000);
    }

    async function loadMessages() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            document.getElementById('online-count').innerText = data.onlineCount || 0;
            document.getElementById('notice-text').innerText = "📢 " + (data.notice || "매너 채팅!");
            
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = '';
            data.messages.forEach(item => {
                const isMy = item.name === myID;
                const div = document.createElement('div');
                div.className = `msg-unit ${isMy ? 'my-msg' : ''}`;
                div.innerHTML = `<div class="bubble">${item.msg}</div>`;
                chatBox.appendChild(div);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch(e) {}
    }

    async function send() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if(!text) return;
        input.value = '';
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name: myID, message: text }) });
    }
</script>
</body>
</html>

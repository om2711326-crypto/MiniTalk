<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Talk vA0.3.2.4</title>
    <style>
        :root {
            --bg: #f5f7fb; --app-bg: #ffffff; --primary: #fee500;
            --text: #2c3e50; --my-bubble: #fee500; --other-bubble: #f0f0f0;
        }
        body { 
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .app-container {
            width: 360px; height: 680px; background: var(--app-bg);
            border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; overflow: hidden; position: relative;
        }
        /* 로딩 바 */
        #loading-bar { 
            position: absolute; top: 0; left: 0; height: 4px; background: var(--primary);
            width: 0; transition: 0.4s; z-index: 1000;
        }
        /* 로그인 화면 */
        #login-screen {
            padding: 40px; display: flex; flex-direction: column; justify-content: center; height: 100%; text-align: center;
        }
        .logo { font-size: 3.5rem; margin-bottom: 10px; }
        .login-input {
            padding: 15px; margin-bottom: 10px; border-radius: 15px; border: 1px solid #eee;
            background: #f9f9f9; outline: none; font-size: 1rem;
        }
        .btn-main {
            padding: 16px; background: var(--primary); border: none; border-radius: 15px;
            font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.97); }
        .btn-guest { margin-top: 20px; color: #888; cursor: pointer; font-size: 0.9rem; text-decoration: underline; background: none; border: none; }

        /* 채팅 화면 */
        #chat-screen { display: none; flex-direction: column; height: 100%; background: #b2c7da; }
        .header { 
            background: #fff; padding: 20px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .msg-unit { display: flex; flex-direction: column; max-width: 80%; animation: fadeInUp 0.3s ease-out; }
        .nickname { font-size: 0.75rem; color: #444; margin-bottom: 4px; font-weight: 600; }
        .bubble { 
            padding: 10px 14px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); word-break: break-all;
        }
        .other-msg .bubble { background: #fff; border-top-left-radius: 2px; }
        .my-msg { align-self: flex-end; }
        .my-msg .nickname { text-align: right; }
        .my-msg .bubble { background: var(--my-bubble); border-top-right-radius: 2px; }

        .chat-img { max-width: 100%; border-radius: 12px; margin-top: 5px; }
        .time { font-size: 0.6rem; color: #666; margin: 0 5px; }
        .msg-info { display: flex; align-items: flex-end; }
        .my-msg .msg-info { flex-direction: row-reverse; }

        /* 꽉 찬 하단 입력창 */
        .input-wrap {
            padding: 20px; background: #fff; border-top-left-radius: 25px; border-top-right-radius: 25px;
            display: flex; gap: 10px; align-items: center; box-shadow: 0 -5px 15px rgba(0,0,0,0.03);
        }
        #msg-input {
            flex: 1; padding: 12px 18px; border-radius: 25px; border: none; background: #f1f3f5; outline: none;
        }
        .btn-send {
            width: 45px; height: 45px; background: var(--primary); border: none; border-radius: 50%;
            cursor: pointer; font-size: 1.2rem; display: flex; justify-content: center; align-items: center;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <div id="loading-bar"></div>

    <div id="login-screen">
        <div class="logo">💬</div>
        <h2 style="margin-bottom: 30px;">Mini Talk <span style="font-weight: normal; font-size: 0.8rem; color: #aaa;">vA0.3.2.4</span></h2>
        <input type="text" id="user-id" class="login-input" placeholder="아이디">
        <input type="password" id="user-pw" class="login-input" placeholder="비밀번호">
        <button class="btn-main" onclick="handleAuth()">채팅 시작하기</button>
        <button class="btn-guest" onclick="enterGuest()">로그인 없이 구경하기 👀</button>
    </div>

    <div id="chat-screen">
        <div class="header">
            <b><span id="display-name"></span> <small style="color:#28a745">🟢<span id="online-count">0</span></small></b>
            <button onclick="location.reload()" style="background:none; border:none; color:#999; cursor:pointer;">나가기</button>
        </div>
        <div id="chat-box"></div>
        <div class="input-wrap">
            <input type="text" id="msg-input" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) send()">
            <button class="btn-send" onclick="send()">🚀</button>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxjRgO9MDzsWktv_jB5C7E2Wh9uinZ_E7QZc6GgYYZMe18CsvSSEbsb3jrg6tqjxdVg/exec';
    let myID = "", isGuest = false;

    function parseMsg(msg) {
        if(!msg) return "";
        let txt = msg.toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        return txt.replace(urlRegex, (url) => {
            if (url.match(/\.(jpeg|jpg|gif|png|webp|svg)$/i) || url.includes('namu.wiki/i/')) {
                return `<img src="${url}" class="chat-img" onclick="window.open('${url}')">`;
            }
            return `<a href="${url}" target="_blank" style="color:#007bff">${url}</a>`;
        });
    }

    async function handleAuth() {
        const id = document.getElementById('user-id').value;
        const pw = document.getElementById('user-pw').value;
        if(!id || !pw) return alert("입력란을 채워주세요!");
        
        document.getElementById('loading-bar').style.width = '100%';
        try {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: 'login', id: id, pw: pw }) });
            myID = id; enterChat();
        } catch(e) { alert("서버 연결에 실패했습니다."); }
        document.getElementById('loading-bar').style.width = '0';
    }

    function enterGuest() {
        myID = "Guest_" + Math.floor(Math.random()*9000+1000);
        isGuest = true;
        enterChat();
        document.getElementById('msg-input').disabled = true;
        document.getElementById('msg-input').placeholder = "구경 모드입니다.";
    }

    function enterChat() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('display-name').innerText = myID;
        loadMessages();
        setInterval(loadMessages, 3000);
    }

    async function loadMessages() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            document.getElementById('online-count').innerText = data.onlineCount;
            const chatBox = document.getElementById('chat-box');
            const isAtBottom = chatBox.scrollHeight - chatBox.scrollTop <= chatBox.clientHeight + 100;
            
            chatBox.innerHTML = '';
            data.messages.forEach(m => {
                const isMy = m.name === myID;
                const div = document.createElement('div');
                div.className = `msg-unit ${isMy ? 'my-msg' : 'other-msg'}`;
                div.innerHTML = `
                    <div class="nickname">${m.name}</div>
                    <div class="msg-info">
                        <div class="bubble">${parseMsg(m.msg)}</div>
                        <div class="time">${m.time}</div>
                    </div>
                `;
                chatBox.appendChild(div);
            });
            if(isAtBottom) chatBox.scrollTop = chatBox.scrollHeight;
        } catch(e) {}
    }

    async function send() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim() || isGuest) return;
        const text = input.value;
        input.value = '';
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name: myID, message: text }) });
        loadMessages();
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Talk vA0.0.7.4</title>
    <style>
        body { background: #b2c7da; font-family: 'Apple SD Gothic Neo', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .app-container { background: #fff; width: 360px; height: 620px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); overflow: hidden; display: flex; flex-direction: column; }
        
        /* 로그인 화면 */
        #login-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 40px; box-sizing: border-box; }
        .logo { font-size: 2.5rem; margin-bottom: 30px; }
        .login-input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; }
        .btn-main { width: 100%; padding: 14px; background: #fee500; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-sub { background: #eee; margin-top: 10px; width: 100%; padding: 10px; border: none; border-radius: 10px; cursor: pointer; color: #555; }
        .btn-guest { background: #f8f8f8; margin-top: 10px; width: 100%; padding: 10px; border: 1px dashed #ccc; border-radius: 10px; cursor: pointer; color: #888; font-size: 0.9rem; }
        
        /* 채팅 화면 */
        #chat-screen { display: none; flex-direction: column; height: 100%; }
        .chat-header { background: #423630; color: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .online-info { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; }
        .online-dot { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; box-shadow: 0 0 5px #2ecc71; }
        
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #b2c7da; }
        .msg-unit { display: flex; flex-direction: column; }
        .nickname { font-size: 0.75rem; color: #444; margin-bottom: 3px; font-weight: bold; }
        .bubble { background: #fff; padding: 10px 14px; border-radius: 15px; font-size: 0.95rem; max-width: 75%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); line-height: 1.4; }
        .my-msg { align-items: flex-end; }
        .my-msg .bubble { background: #fee500; }
        
        .sending { opacity: 0.6; } /* 낙관적 업데이트용 스타일 */

        .input-area { padding: 12px; background: #fff; display: flex; gap: 8px; border-top: 1px solid #eee; }
        #msg-input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 12px; outline: none; }
        .send-btn { background: #fee500; border: none; padding: 0 18px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="login-screen">
        <div class="logo">💬</div>
        <input type="text" id="user-id" class="login-input" placeholder="아이디">
        <input type="password" id="user-pw" class="login-input" placeholder="비밀번호">
        <button class="btn-main" onclick="handleAuth('login')">로그인</button>
        <button class="btn-sub" onclick="handleAuth('signup')">회원가입</button>
        <button class="btn-guest" onclick="enterGuestMode()">👀 구경</button>
        <div id="auth-status" style="font-size:0.75rem; color:#888; margin-top:20px;">Mini Talk vA0.0.7.4</div>
    </div>

    <div id="chat-screen">
        <div class="chat-header">
            <div>
                <span id="my-name-display" style="font-weight:bold;">사용자</span>
            </div>
            <div class="online-info">
                <div class="online-dot"></div>
                <span>접속자: <b id="online-count">0</b>명</span>
                <button onclick="logout()" style="margin-left:10px; background:none; border:none; color:#aaa; cursor:pointer; font-size:0.7rem;">로그아웃</button>
            </div>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="메시지 입력..." onkeypress="if(event.keyCode==13) send()">
            <button class="send-btn" id="send-btn" onclick="send()">전송</button>
        </div>
    </div>
</div>

<script>
    // 네가 준 최신 API 주소
    const API_URL = 'https://script.google.com/macros/s/AKfycbxEUfxGpcovcVFEzYTmCcQDHW7nlXDgmgP84rFHmgAaS2hZ3Uu_CB0AWbKja3de-0XH/exec';
    let myID = "";
    let isGuest = false;

    // A. 로그인/가입 처리
    async function handleAuth(type) {
        const id = document.getElementById('user-id').value;
        const pw = document.getElementById('user-pw').value;
        if(!id || !pw) return alert("아이디와 비번을 입력해줘!");

        if(type === 'login') {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: 'login', id: id, pw: pw }) });
            const data = await res.json();
            if(data.result === "success") enterChat(id, false);
            else alert("아이디나 비번이 틀렸어요!");
        } else {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'signup', id: id, pw: pw }) });
            alert("회원가입 요청 완료!");
        }
    }

    // B. 구경하기 모드 (Viewer 계정 생성 및 로그인)
    async function enterGuestMode() {
        const guestID = "Viewer_" + Math.floor(Math.random() * 9000 + 1000);
        const guestPW = "View12341234";

        // 임시 계정 가입 시키기
        await fetch(API_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ type: 'signup', id: guestID, pw: guestPW }) 
        });

        // 가입 처리 대기 후 로그인
        setTimeout(async () => {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: 'login', id: guestID, pw: guestPW }) });
            const data = await res.json();
            if(data.result === "success") enterChat(guestID, true);
            else alert("구경모드 입장 실패!");
        }, 600);
    }

    // C. 채팅방 입장
    function enterChat(id, guestMode) {
        myID = id;
        isGuest = guestMode;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        
        const nameDisplay = document.getElementById('my-name-display');
        const input = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');

        if(isGuest) {
            nameDisplay.innerText = "👀 구경중!" + id;
            input.placeholder = "구경 모드입니다 (채팅 불가)";
            input.disabled = true;
            sendBtn.style.display = 'none';
        } else {
            nameDisplay.innerText = id + "님";
        }

        loadMessages();
        setInterval(loadMessages, 4000);
    }

    // D. 로그아웃 (ONLINE -> 0 처리)
    async function logout() {
        if(!myID) return;
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'logout', id: myID }) });
        location.reload();
    }

    // E. 창 닫을 때 오프라인 처리
    window.addEventListener('beforeunload', () => {
        if(myID) {
            navigator.sendBeacon(API_URL, JSON.stringify({ type: 'logout', id: myID }));
        }
    });

    // F. 메시지 및 접속자 수 로드
    async function loadMessages() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            document.getElementById('online-count').innerText = data.onlineCount;

            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = '';
            data.messages.forEach(item => {
                const isMyMsg = item.name === myID;
                const div = document.createElement('div');
                div.className = `msg-unit ${isMyMsg ? 'my-msg' : ''}`;
                div.innerHTML = `<div class="nickname">${item.name}</div><div class="bubble">${item.msg}</div>`;
                chatBox.appendChild(div);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch(e) {}
    }

    // G. 메시지 전송 (낙관적 업데이트 포함)
    async function send() {
        if(isGuest) return;
        const input = document.getElementById('msg-input');
        const message = input.value;
        if(!message.trim()) return;
        
        // 내 화면에 먼저 띄우기
        const chatBox = document.getElementById('chat-box');
        const tempDiv = document.createElement('div');
        tempDiv.className = 'msg-unit my-msg';
        tempDiv.innerHTML = `<div class="nickname">${myID}</div><div class="bubble sending">${message}</div>`;
        chatBox.appendChild(tempDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        
        input.value = '';
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name: myID, message: message }) });
        setTimeout(loadMessages, 500);
    }
</script>
</body>
</html>

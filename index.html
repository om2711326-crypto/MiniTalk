<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Talk vA0.2.3.2</title>
    <style>
        :root { --bg-color: #b2c7da; --app-bg: #fff; --text-color: #000; --header-bg: #423630; --my-bubble: #fee500; --other-bubble: #fff; --accent: #fee500; }
        [data-theme='dark'] { --bg-color: #2f3136; --app-bg: #36393f; --text-color: #ffffff; --header-bg: #202225; --my-bubble: #f2d400; --other-bubble: #4f545c; }
        body { background: var(--bg-color); font-family: 'Apple SD Gothic Neo', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .app-container { background: var(--app-bg); width: 360px; height: 620px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); overflow: hidden; display: flex; flex-direction: column; position: relative; }
        #loading-bar-container { position: absolute; top: 0; left: 0; width: 100%; height: 4px; z-index: 100; display: none; }
        #loading-bar { height: 100%; background: var(--accent); width: 0%; transition: 0.3s; }
        .chat-header { background: var(--header-bg); color: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: var(--bg-color); scroll-behavior: smooth; }
        .msg-unit { display: flex; flex-direction: column; max-width: 85%; animation: fadeInUp 0.3s ease; }
        .nickname { font-size: 0.75rem; color: var(--text-color); margin-bottom: 4px; font-weight: bold; }
        .msg-info { display: flex; align-items: flex-end; gap: 6px; }
        .bubble { background: var(--other-bubble); padding: 10px 14px; border-radius: 18px; border-top-left-radius: 2px; font-size: 0.9rem; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-break: break-all; color: #000; }
        .my-msg { align-self: flex-end; }
        .my-msg .nickname { text-align: right; }
        .my-msg .msg-info { flex-direction: row-reverse; }
        .my-msg .bubble { background: var(--my-bubble); border-top-right-radius: 2px; border-top-left-radius: 18px; }
        .chat-img { max-width: 100%; border-radius: 10px; margin-top: 5px; display: block; border: 1px solid rgba(0,0,0,0.05); }
        .timestamp { font-size: 0.6rem; color: #666; min-width: 45px; }
        .input-area { padding: 12px; background: var(--app-bg); display: flex; gap: 8px; border-top: 1px solid #eee; }
        #msg-input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 20px; outline: none; background: #f9f9f9; }
        .btn-send { background: var(--accent); border: none; padding: 0 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="app-container">
    <div id="loading-bar-container"><div id="loading-bar"></div></div>
    <div id="login-screen" style="padding:40px; text-align:center;">
        <div style="font-size: 3rem;">💬</div><br>
        <input type="text" id="user-id" placeholder="아이디" style="width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;">
        <input type="password" id="user-pw" placeholder="비밀번호" style="width:100%; padding:10px; margin-bottom:20px; border-radius:10px; border:1px solid #ddd;">
        <button class="btn-send" style="width:100%; height:45px;" onclick="handleAuth()">채팅방 입장</button>
    </div>
    <div id="chat-screen" style="display:none; height:100%; flex-direction:column;">
        <div class="chat-header"><b id="my-name-display"></b><small>🟢<span id="online-count">0</span></small></div>
        <div id="chat-box" onscroll="checkScroll()"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="메시지 입력..." onkeypress="if(event.keyCode==13) send()">
            <button class="btn-send" onclick="send()">전송</button>
        </div>
    </div>
</div>

<script>
    // ✅ 전달해주신 가장 최신 API 주소입니다!
    const API_URL = 'https://script.google.com/macros/s/AKfycbyfFAUqv0NXFxPXJN73IL5n5Mv_u5kXHKC8XeOf10LCOsPSxn7ue2yBH1HzSVSooGU-/exec'; 
    let myID = "", isAutoScroll = true;

    function checkScroll() {
        const box = document.getElementById('chat-box');
        isAutoScroll = (box.scrollHeight - box.scrollTop - box.clientHeight < 100);
    }

    function parseContent(msg) {
        if(!msg) return "";
        let content = msg.toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const urlPattern = /(https?:\/\/[^\s]+)/g;
        content = content.replace(urlPattern, (url) => {
            if (url.match(/\.(jpeg|jpg|gif|png|webp|svg)$/i) || url.includes('namu.wiki/i/')) {
                return `<img src="${url}" class="chat-img" onclick="window.open('${url}')">`;
            }
            return `<a href="${url}" target="_blank" style="color: #00aaff;">${url}</a>`;
        });
        content = content.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/__(.*?)__/g, '<u>$1</u>').replace(/\*(.*?)\*/g, '<i>$1</i>').replace(/~~(.*?)~~/g, '<s>$1</s>').replace(/`(.*?)`/g, '<code>$1</code>');
        return content;
    }

    async function handleAuth() {
        const id = document.getElementById('user-id').value;
        const pw = document.getElementById('user-pw').value;
        if(!id || !pw) return;
        document.getElementById('loading-bar-container').style.display = 'block';
        document.getElementById('loading-bar').style.width = '50%';
        try {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: 'login', id: id, pw: pw }) });
            const data = await res.json();
            if(data.result === "success") {
                myID = id; document.getElementById('loading-bar').style.width = '100%';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('chat-screen').style.display = 'flex';
                    document.getElementById('my-name-display').innerText = myID;
                    loadMessages(); setInterval(loadMessages, 3000);
                }, 500);
            } else { alert("정보 불일치!"); document.getElementById('loading-bar-container').style.display = 'none'; }
        } catch(e) { alert("서버 연결 실패! 배포 설정을 확인해 주세요."); }
    }

    async function loadMessages() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            document.getElementById('online-count').innerText = data.onlineCount || 0;
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = '';
            data.messages.forEach(item => {
                const isMy = item.name === myID;
                const div = document.createElement('div');
                div.className = `msg-unit ${isMy ? 'my-msg' : ''}`;
                div.innerHTML = `<div class="nickname">${item.name}</div><div class="msg-info"><div class="bubble">${parseContent(item.msg)}</div><div class="timestamp">${item.time}</div></div>`;
                chatBox.appendChild(div);
            });
            if (isAutoScroll) chatBox.scrollTop = chatBox.scrollHeight;
        } catch(e) {}
    }

    async function send() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if(!text) return;
        input.value = '';
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name: myID, message: text }) });
    }
</script>
</body>
</html>

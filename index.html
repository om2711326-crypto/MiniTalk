<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Talk vA0.1.0.0</title>
    <style>
        :root {
            --bg-color: #b2c7da; --app-bg: #fff; --text-color: #000;
            --header-bg: #423630; --my-bubble: #fee500; --other-bubble: #fff;
            --input-bg: #fff;
        }
        /* 다크모드 설정 */
        [data-theme='dark'] {
            --bg-color: #2f3136; --app-bg: #36393f; --text-color: #ffffff;
            --header-bg: #202225; --my-bubble: #f2d400; --other-bubble: #4f545c;
            --input-bg: #40444b;
        }

        body { background: var(--bg-color); font-family: 'Apple SD Gothic Neo', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; transition: 0.3s; }
        .app-container { background: var(--app-bg); width: 360px; height: 620px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); overflow: hidden; display: flex; flex-direction: column; }
        
        /* 로그인 화면 */
        #login-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 40px; box-sizing: border-box; color: var(--text-color); }
        .login-input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; background: var(--input-bg); color: var(--text-color); }
        .btn-main { width: 100%; padding: 14px; background: #fee500; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; }

        /* 채팅 화면 */
        #chat-screen { display: none; flex-direction: column; height: 100%; }
        .chat-header { background: var(--header-bg); color: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: var(--bg-color); }
        .msg-unit { display: flex; flex-direction: column; color: var(--text-color); }
        .nickname { font-size: 0.75rem; margin-bottom: 3px; font-weight: bold; opacity: 0.8; }
        .bubble { background: var(--other-bubble); padding: 10px 14px; border-radius: 15px; font-size: 0.95rem; max-width: 75%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-break: break-all; color: inherit; }
        .my-msg { align-items: flex-end; }
        .my-msg .bubble { background: var(--my-bubble); color: #000; }
        
        /* 이미지 스타일 */
        .chat-img { max-width: 100%; border-radius: 10px; margin-top: 5px; cursor: pointer; display: block; }
        
        .input-area { padding: 12px; background: var(--app-bg); display: flex; gap: 8px; border-top: 1px solid #eee; }
        #msg-input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 12px; outline: none; background: var(--input-bg); color: var(--text-color); }
        .theme-btn { cursor: pointer; font-size: 1.2rem; background: none; border: none; color: #fff; outline: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="login-screen">
        <div style="font-size: 3rem; margin-bottom: 20px;">💬</div>
        <b style="margin-bottom:20px;">Mini Talk vA0.1.0.0</b>
        <input type="text" id="user-id" class="login-input" placeholder="아이디">
        <input type="password" id="user-pw" class="login-input" placeholder="비밀번호">
        <button class="btn-main" onclick="handleAuth('login')">로그인 / 회원가입</button>
        <button onclick="enterGuestMode()" style="margin-top:15px; background:none; border:none; color:#888; cursor:pointer;">👀 구경하기 (접속자 포함)</button>
    </div>

    <div id="chat-screen">
        <div class="chat-header">
            <div><b id="my-name-display">사용자</b> <small>(🟢<span id="online-count">0</span>)</small></div>
            <div>
                <button class="theme-btn" id="theme-icon" onclick="toggleTheme()">☀️</button>
                <button onclick="logout()" style="background:none; border:none; color:#aaa; cursor:pointer; font-size:0.7rem; margin-left:10px;">나가기</button>
            </div>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="메시지 또는 이미지 주소..." onkeypress="if(event.keyCode==13) send()">
            <button onclick="send()" style="background:#fee500; border:none; padding:10px 15px; border-radius:10px; font-weight:bold; cursor:pointer; color:#000;">전송</button>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbydYz_4e0aCa1_Cr2Pp94QJoAczanui0ZQus6hiI4WB9rea3Ylx-bMsrYmpGe4Ho_kj/exec';
    let myID = "";
    let isGuest = false;
    let lastMsgCount = 0;

    // 브라우저 알림 권한
    if (Notification.permission !== "granted" && Notification.permission !== "denied") {
        Notification.requestPermission();
    }

    // 다크모드 토글
    function toggleTheme() {
        const doc = document.documentElement;
        const icon = document.getElementById('theme-icon');
        if (doc.getAttribute('data-theme') === 'dark') {
            doc.removeAttribute('data-theme');
            icon.innerText = '☀️';
        } else {
            doc.setAttribute('data-theme', 'dark');
            icon.innerText = '🌙';
        }
    }

    // 링크 및 이미지 자동 변환
    function parseContent(msg) {
        const urlPattern = /(https?:\/\/[^\s]+)/g;
        return msg.replace(urlPattern, (url) => {
            if (url.match(/\.(jpeg|jpg|gif|png|webp|svg)$/i)) {
                return `<img src="${url}" class="chat-img" onclick="window.open('${url}')">`;
            }
            return `<a href="${url}" target="_blank" style="color: #00aaff;">${url}</a>`;
        });
    }

    async function handleAuth(type) {
        const id = document.getElementById('user-id').value;
        const pw = document.getElementById('user-pw').value;
        if(!id || !pw) return alert("다 입력해줘!");

        // 먼저 가입 시도 (이미 있으면 에러 없이 진행됨)
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'signup', id: id, pw: pw }) });
        
        // 로그인 시도
        setTimeout(async () => {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: 'login', id: id, pw: pw }) });
            const data = await res.json();
            if(data.result === "success") enterChat(id, false);
            else alert("비밀번호가 틀렸거나 로그인 실패!");
        }, 500);
    }

    async function enterGuestMode() {
        const guestID = "Viewer_" + Math.floor(Math.random() * 9000 + 1000);
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'signup', id: guestID, pw: '1234' }) });
        setTimeout(() => enterChat(guestID, true), 500);
    }

    function enterChat(id, guestStatus) {
        myID = id;
        isGuest = guestStatus;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('my-name-display').innerText = isGuest ? "👀 구경꾼" : id;
        
        if(isGuest) {
            document.getElementById('msg-input').disabled = true;
            document.getElementById('msg-input').placeholder = "구경꾼은 채팅 불가";
        }

        loadMessages();
        setInterval(loadMessages, 4000);
    }

    async function loadMessages() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            document.getElementById('online-count').innerText = data.onlineCount;

            // 알림 처리
            if (lastMsgCount !== 0 && data.messages.length > lastMsgCount) {
                const newMsg = data.messages[data.messages.length - 1];
                if (newMsg.name !== myID && Notification.permission === "granted") {
                    new Notification("Mini Talk", { body: `${newMsg.name}: ${newMsg.msg}` });
                }
            }
            lastMsgCount = data.messages.length;

            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = '';
            data.messages.forEach(item => {
                const isMy = item.name === myID;
                const div = document.createElement('div');
                div.className = `msg-unit ${isMy ? 'my-msg' : ''}`;
                div.innerHTML = `<div class="nickname">${item.name}</div>
                                 <div class="bubble">${parseContent(item.msg)}</div>`;
                chatBox.appendChild(div);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch(e) {}
    }

    async function send() {
        if(isGuest) return;
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if(!text) return;
        input.value = '';

        // 낙관적 업데이트
        const chatBox = document.getElementById('chat-box');
        const tempDiv = document.createElement('div');
        tempDiv.className = 'msg-unit my-msg';
        tempDiv.innerHTML = `<div class="nickname">${myID}</div><div class="bubble" style="opacity:0.6;">${parseContent(text)}</div>`;
        chatBox.appendChild(tempDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name: myID, message: text }) });
    }

    async function logout() {
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'logout', id: myID }) });
        location.reload();
    }

    window.addEventListener('beforeunload', () => {
        if(myID) navigator.sendBeacon(API_URL, JSON.stringify({ type: 'logout', id: myID }));
    });
</script>
</body>
</html>
